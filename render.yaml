# Render Blueprint — optional. You can also configure the web service manually in the dashboard.
services:
  - type: web
    name: candidatetracker
    runtime: node
    plan: starter
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
