# Render Blueprint — optional. You can also configure the web service manually in the dashboard.
services:
  - type: web
    name: candidatetracker
    runtime: node
    plan: starter
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: CANDIDATE_LOOKUP_DB_PATH
        value: /var/data/candidates.db
    disk:
      name: candidatetracker-data
      mountPath: /var/data
      sizeGB: 1
